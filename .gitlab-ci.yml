# =====================================================
# PandaMarket — GitLab CI/CD
# =====================================================
# Stages:
#   - lint           : fast lint/type-check on every push & MR
#   - test           : SAST scans (GitLab security templates)
#   - secret-detect  : Secret detection scan
# =====================================================

stages:
  - lint
  - test
  - secret-detect

# ----- Include GitLab security templates -----
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Map the templates' jobs to our stages.
sast:
  stage: test

secret_detection:
  stage: secret-detect

# ----- Repository sanity check -----
# A guaranteed-running job so the pipeline is never empty.
repo-check:
  stage: lint
  image: alpine:3.20
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  script:
    - echo "Repository sanity check"
    - test -f README.md && echo "  ✓ README.md present"
    - test -f PROJECT_STATUS.md && echo "  ✓ PROJECT_STATUS.md present"
    - test -f docker-compose.yml && echo "  ✓ docker-compose.yml present"
    - test -f Caddyfile && echo "  ✓ Caddyfile present"
    - test -d "ai instructions" && echo "  ✓ ai instructions/ present"
    - test -d backend/src && echo "  ✓ backend/src/ present"
    - test -d frontend/src && echo "  ✓ frontend/src/ present"
    - echo "All repository structure checks passed."

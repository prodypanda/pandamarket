# =====================================================
# PandaMarket - Docker Compose (Development)
# =====================================================
# Services:
#  - PostgreSQL 16 (relational data)
#  - Redis 7      (cache + BullMQ queues)
#  - Meilisearch  (Hub central search)
#  - MinIO        (S3-compatible storage)
# =====================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: pd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pandamarket
      POSTGRES_USER: pd_user
      POSTGRES_PASSWORD: pd_password
    ports:
      - '5432:5432'
    volumes:
      - pd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pd_user -d pandamarket']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: pd_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - pd_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: pd_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: meili_master_dev_key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - pd_meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pd_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9100:9000' # API (port 9100 to avoid conflict with Medusa on 9000)
      - '9101:9001' # Web console
    volumes:
      - pd_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------
  # Optional: Auto-create MinIO buckets on startup
  # ---------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    container_name: pd_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/pd-product-images || true;
      mc mb -p local/pd-private-files || true;
      mc mb -p local/pd-themes || true;
      mc anonymous set public local/pd-product-images;
      mc anonymous set public local/pd-themes;
      echo 'MinIO buckets ready';
      exit 0;
      "

volumes:
  pd_pg_data:
  pd_redis_data:
  pd_meili_data:
  pd_minio_data:

networks:
  default:
    name: pd_network
